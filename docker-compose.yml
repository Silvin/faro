# Entorno LOCAL del backend de Faro: Postgres + API (Go).
# El frontend vive en el repo faro-ui (se corre por separado con su propio dev/compose).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: faro
      POSTGRES_PASSWORD: faro
      POSTGRES_DB: faro
    ports:
      - "5432:5432"
    volumes:
      - faro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faro"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://faro:faro@db:5432/faro?sslmode=disable"
      JWT_SECRET: "dev-insecure-secret-change-me"
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  faro_pgdata:
